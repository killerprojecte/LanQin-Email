services:
  lanqin-email:
    image: ${LANQIN_IMAGE:-ghcr.io/lanqin996/lanqin-email:latest}
    env_file: .env
    ports:
      - "80:80"
      - "443:443"
      - "25:25"
      - "587:587"
      - "993:993"
    volumes:
      - ./data:/data
      - ./mail:/var/mail/vhosts
      - ./dkim:/var/lib/rspamd/dkim
    restart: unless-stopped
